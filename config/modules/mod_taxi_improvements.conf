[worldserver]

########################################
# Taxi Improvements configuration
########################################
#
#    TaxiImprovements.Enable
#        Default: 1 - Enabled / 0 - Disabled
#
#    TaxiImprovements.ShareTaxiMask
#        Description: Share discovered flight paths across all characters on the same account.
#                     On login, a character inherits every node found by any other character
#                     on the account.  When a new node is discovered it is immediately
#                     written to all other characters on the account (and applied live if
#                     they are online).
#        Default: 1 - Enabled / 0 - Disabled

TaxiImprovements.Enable        = 1
TaxiImprovements.ShareTaxiMask = 1
